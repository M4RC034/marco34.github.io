<style>
/* Hide the Google Translate top bar */
.goog-te-banner-frame.skiptranslate {
    display: none !important;
} 
body {
    top: 0px !important; 
}
/* Style for navbar integration */
#google_translate_element select {
    background-color: transparent;
    color: inherit;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 2px 5px;
    font-size: 14px;
}
</style>

<div id="google_translate_element_container" style="display:none;">
  <div id="google_translate_element"></div>
</div>

<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'en',
    includedLanguages: 'en,zh-CN,zh-TW',
    layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
    autoDisplay: false
  }, 'google_translate_element');
}
</script>

<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {
  // Move the translate widget to the right navbar
  setTimeout(function() {
    const rightNavbar = document.querySelector(".navbar-nav.ms-auto");
    const translateDiv = document.getElementById("google_translate_element");
    if (rightNavbar && translateDiv) {
      let li = document.createElement("li");
      li.className = "nav-item";
      li.style.marginTop = "4px";
      li.style.marginLeft = "10px";
      li.appendChild(translateDiv);
      rightNavbar.appendChild(li);
    }
  }, 100);
});
</script>
